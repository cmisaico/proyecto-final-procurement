name: CI/CD Pipeline - Procurement Platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}
  AKS_NAME: ${{ secrets.AKS_NAME }}
  AKS_RG: ${{ secrets.AKS_RESOURCE_GROUP }}
  IMAGE_NAME: procurement-api
  FRONTEND_IMAGE: procurement-frontend
  NAMESPACE: ai-platform

jobs:
  # ────────────────────────────────
  # JOB 1: Build y Test
  # ────────────────────────────────
  build-and-test:
    name: Build & Unit Tests
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        # driver: docker usa el daemon local (BuildKit integrado en Docker 23+).
        # No descarga moby/buildkit de Docker Hub → sin dependencia de Docker Hub.
        driver: docker

    - name: Azure Login
      run: |
        az login --service-principal \
          --username "${{ secrets.AZURE_CLIENT_ID }}" \
          --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
          --tenant "${{ secrets.AZURE_TENANT_ID }}"
        az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

    - name: Login to ACR
      run: az acr login --name $ACR_NAME

    - name: Import base images to ACR
      run: |
        az acr import --name $ACR_NAME \
          --source docker.io/library/python:3.12-slim \
          --image python:3.12-slim --force || true

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx

    - name: Run unit tests
      run: |
        pytest tests/ -v --tb=short || echo "No tests directory found, skipping"
      continue-on-error: true

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/backend/Dockerfile
        push: false
        load: true
        build-args: REGISTRY=${{ env.ACR_NAME }}.azurecr.io/
        tags: |
          ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

    - name: Save image to tar
      run: docker save $ACR_NAME.azurecr.io/$IMAGE_NAME:latest -o /tmp/image.tar

    - name: Upload image artifact
      uses: actions/upload-artifact@v4
      with:
        name: docker-image
        path: /tmp/image.tar

  # ────────────────────────────────
  # JOB 1b: Build Frontend
  # ────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        driver: docker

    - name: Azure Login
      run: |
        az login --service-principal \
          --username "${{ secrets.AZURE_CLIENT_ID }}" \
          --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
          --tenant "${{ secrets.AZURE_TENANT_ID }}"
        az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

    - name: Login to ACR
      run: az acr login --name $ACR_NAME

    - name: Import base images to ACR
      run: |
        az acr import --name $ACR_NAME \
          --source docker.io/library/node:20-alpine \
          --image node:20-alpine --force || true

    - name: Build and push frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./frontend
        file: docker/frontend/Dockerfile
        push: ${{ github.ref == 'refs/heads/main' }}
        build-args: REGISTRY=${{ env.ACR_NAME }}.azurecr.io/
        tags: |
          ${{ env.ACR_NAME }}.azurecr.io/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          ${{ env.ACR_NAME }}.azurecr.io/${{ env.FRONTEND_IMAGE }}:latest

  # ────────────────────────────────
  # JOB 2: Security Scan
  # ────────────────────────────────
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - uses: actions/checkout@v4

    - name: Download image
      uses: actions/download-artifact@v4
      with:
        name: docker-image
        path: /tmp

    - name: Load Docker image
      run: docker load --input /tmp/image.tar

    - name: Run Trivy vulnerability scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
        format: 'table'
        severity: 'CRITICAL,HIGH'
        exit-code: '0'

  # ────────────────────────────────
  # JOB 3: Push a ACR
  # ────────────────────────────────
  push-to-acr:
    name: Push to ACR
    runs-on: ubuntu-latest
    needs: [build-and-test, security-scan]
    if: github.ref == 'refs/heads/main'

    steps:
    - uses: actions/checkout@v4

    - name: Azure Login
      run: |
        az login --service-principal \
          --username "${{ secrets.AZURE_CLIENT_ID }}" \
          --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
          --tenant "${{ secrets.AZURE_TENANT_ID }}"
        az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

    - name: Login to ACR
      run: az acr login --name $ACR_NAME

    - name: Download image
      uses: actions/download-artifact@v4
      with:
        name: docker-image
        path: /tmp

    - name: Load and push Docker image
      run: |
        docker load --input /tmp/image.tar
        docker tag $ACR_NAME.azurecr.io/$IMAGE_NAME:latest \
          $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
        docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}
        docker push $ACR_NAME.azurecr.io/$IMAGE_NAME:latest

  # ────────────────────────────────
  # JOB 4: Deploy con Canary
  # ────────────────────────────────
  deploy:
    name: Deploy to AKS (Canary)
    runs-on: ubuntu-latest
    needs: [push-to-acr, build-frontend]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
    - uses: actions/checkout@v4

    - name: Azure Login
      run: |
        az login --service-principal \
          --username "${{ secrets.AZURE_CLIENT_ID }}" \
          --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
          --tenant "${{ secrets.AZURE_TENANT_ID }}"
        az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

    - name: Set up kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: 'v1.29.0'

    - name: Get AKS credentials
      run: |
        az aks get-credentials \
          --resource-group $AKS_RG \
          --name $AKS_NAME \
          --overwrite-existing

    - name: Install Argo Rollouts kubectl plugin
      run: |
        curl -LO https://github.com/argoproj/argo-rollouts/releases/latest/download/kubectl-argo-rollouts-linux-amd64
        chmod +x kubectl-argo-rollouts-linux-amd64
        sudo mv kubectl-argo-rollouts-linux-amd64 /usr/local/bin/kubectl-argo-rollouts

    - name: Set up Helm
      uses: azure/setup-helm@v4
      with:
        version: 'v3.14.0'

    - name: Deploy GPU Operator
      run: |
        helm repo add nvidia https://helm.ngc.nvidia.com/nvidia
        helm repo update
        helm upgrade --install gpu-operator nvidia/gpu-operator \
          --namespace gpu-operator \
          --create-namespace \
          --version v24.3.0 \
          --values k8s/nvidia/gpu-operator-values.yaml \
          --wait --timeout 10m || echo "GPU Operator already up-to-date or GPU node unavailable — skipping"
        # Device plugin gestionado fuera del GPU Operator (devicePlugin.enabled=false)
        kubectl apply -f k8s/nvidia/device-plugin.yaml

    - name: Deploy Frontend
      run: |
        sed "s|FRONTEND_IMAGE|$ACR_NAME.azurecr.io/$FRONTEND_IMAGE:${{ github.sha }}|g" \
          k8s/manifests/frontend.yaml | kubectl apply -f -
        kubectl rollout status deployment/frontend -n $NAMESPACE --timeout 5m

    - name: Deploy API Gateway Helm Chart
      run: |
        helm upgrade api-gateway k8s/charts/api-gateway \
          -n $NAMESPACE \
          -f k8s/azure/api-gateway.yaml \
          --wait --timeout 3m
        # Apply Rollout + stable/canary Services (not managed by the Helm chart).
        # Must run after the Helm chart so the ConfigMap and Secret exist first.
        kubectl apply -f k8s/manifests/api-gateway-rollout.yaml

    - name: Deploy API Gateway (Canary)
      run: |
        kubectl argo rollouts set image api-gateway \
          api-gateway=$ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }} \
          -n $NAMESPACE
        kubectl argo rollouts status api-gateway -n $NAMESPACE --timeout 20m

    - name: Smoke Tests
      run: |
        INGRESS_IP=$(kubectl get svc -n ingress-nginx ingress-nginx-controller \
          -o jsonpath='{.status.loadBalancer.ingress[0].ip}')

        echo "Testing against: http://procurement.local ($INGRESS_IP)"
        echo "$INGRESS_IP  procurement.local" | sudo tee -a /etc/hosts

        HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://procurement.local/api/v1/health)
        if [ "$HTTP_STATUS" != "200" ]; then
          echo "Health check failed: $HTTP_STATUS"
          kubectl argo rollouts abort api-gateway -n $NAMESPACE
          exit 1
        fi

        API_VERSION=$(curl -s http://procurement.local/api/v1/health | jq -r '.version // "unknown"')
        echo "API Version: $API_VERSION"
        echo "Smoke tests passed!"

    - name: K6 Canary Validation
      run: |
        sudo gpg -k
        sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg \
          --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
        echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
          | sudo tee /etc/apt/sources.list.d/k6.list
        sudo apt-get update && sudo apt-get install k6 -y

        k6 run \
          --env BASE_URL=http://procurement.local \
          k6/scripts/k8s-benchmark.js \
          --out json=/tmp/k6_canary.json || true

        ERROR_RATE=$(cat /tmp/k6_canary.json | \
          jq '[.[] | select(.metric == "http_req_failed") | .data.value] | add / length' 2>/dev/null || echo "0")
        echo "Error rate: $ERROR_RATE"

        if (( $(echo "$ERROR_RATE > 0.05" | bc -l) )); then
          echo "Error rate too high, aborting canary"
          kubectl argo rollouts abort api-gateway -n $NAMESPACE
          exit 1
        fi

    - name: Promote Canary to 100%
      run: |
        kubectl argo rollouts promote api-gateway -n $NAMESPACE --full
        kubectl argo rollouts status api-gateway -n $NAMESPACE --timeout 20m
        echo "Deployment completado exitosamente!"

    - name: Deployment Summary
      if: always()
      run: |
        echo "=== Deployment Summary ==="
        kubectl get rollouts -n $NAMESPACE
        kubectl get pods -n $NAMESPACE
        echo "Image: $ACR_NAME.azurecr.io/$IMAGE_NAME:${{ github.sha }}"

  # ────────────────────────────────
  # JOB 5: Rollback en fallos
  # ────────────────────────────────
  rollback:
    name: Rollback on Failure
    runs-on: ubuntu-latest
    needs: deploy
    if: failure() && github.ref == 'refs/heads/main'

    steps:
    - name: Azure Login
      run: |
        az login --service-principal \
          --username "${{ secrets.AZURE_CLIENT_ID }}" \
          --password "${{ secrets.AZURE_CLIENT_SECRET }}" \
          --tenant "${{ secrets.AZURE_TENANT_ID }}"
        az account set --subscription "${{ secrets.AZURE_SUBSCRIPTION_ID }}"

    - name: Get AKS credentials
      run: |
        az aks get-credentials \
          --resource-group $AKS_RG \
          --name $AKS_NAME

    - name: Install Argo Rollouts kubectl plugin
      run: |
        curl -LO https://github.com/argoproj/argo-rollouts/releases/latest/download/kubectl-argo-rollouts-linux-amd64
        chmod +x kubectl-argo-rollouts-linux-amd64
        sudo mv kubectl-argo-rollouts-linux-amd64 /usr/local/bin/kubectl-argo-rollouts

    - name: Rollback
      run: |
        echo "Ejecutando rollback automático..."
        kubectl argo rollouts undo api-gateway -n $NAMESPACE
        kubectl argo rollouts status api-gateway -n $NAMESPACE --timeout 5m
        echo "Rollback completado"
