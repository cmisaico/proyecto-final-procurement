services:

  # ────────────────────────────────────────────────────────────
  # APPLICATION TIER
  # ────────────────────────────────────────────────────────────

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: procurement_backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment: &common_env
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-procurement_db}
      POSTGRES_USER: ${POSTGRES_USER:-procurement}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-procurement_pass}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-procurement-docs}
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      # vLLM-compatible settings (Ollama /v1 in dev, vLLM in K8s)
      VLLM_BASE_URL: ${VLLM_BASE_URL:-http://ollama:11434/v1}
      VLLM_MODEL: ${VLLM_MODEL:-qwen2.5:7b}
      VLLM_API_KEY: ${VLLM_API_KEY:-not-needed}
      EMBEDDINGS_BASE_URL: ${EMBEDDINGS_BASE_URL:-http://ollama:11434/v1}
      EMBEDDINGS_MODEL: ${EMBEDDINGS_MODEL:-nomic-embed-text}
      # Legacy Ollama vars (kept for compatibility)
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_LLM_MODEL: ${OLLAMA_LLM_MODEL:-qwen2.5:7b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      CONTEXT_TOP_K: "10"
      MAX_CONTEXT_TOKENS: "4000"
      GUARDRAIL_THRESHOLD: "0.35"
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
      OTEL_SERVICE_NAME: "procurement-backend"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - procurement_net
    volumes:
      - ./:/app
    labels:
      logging: "promtail"
      service: "backend"

  langgraph-worker:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: procurement_langgraph_worker
    restart: unless-stopped
    command: ["python", "worker/main.py"]
    environment:
      <<: *common_env
      WORKER_POLL_INTERVAL: "15"
      OTEL_SERVICE_NAME: "langgraph-worker"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - procurement_net
    volumes:
      - ./:/app
    labels:
      logging: "promtail"
      service: "langgraph-worker"

  workflow-engine:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: procurement_workflow_engine
    restart: unless-stopped
    ports:
      - "8001:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    environment:
      <<: *common_env
      OTEL_SERVICE_NAME: "workflow-engine"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      minio:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - procurement_net
    volumes:
      - ./:/app
    labels:
      logging: "promtail"
      service: "workflow-engine"

  # ────────────────────────────────────────────────────────────
  # DATA TIER
  # ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: procurement_postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-procurement_db}
      POSTGRES_USER: ${POSTGRES_USER:-procurement}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-procurement_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/01_init.sql
      - ./scripts/fase02_migration.sql:/docker-entrypoint-initdb.d/02_fase02.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-procurement}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - procurement_net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: procurement_qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - procurement_net

  minio:
    image: minio/minio:latest
    container_name: procurement_minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - procurement_net

  ollama:
    image: ollama/ollama:latest
    container_name: procurement_ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - procurement_net
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        sleep 5
        ollama pull qwen2.5:7b
        ollama pull nomic-embed-text
        wait

  # ────────────────────────────────────────────────────────────
  # OBSERVABILITY TIER
  # ────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: procurement_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    networks:
      - procurement_net

  grafana:
    image: grafana/grafana:latest
    container_name: procurement_grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-procurement123}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki
    networks:
      - procurement_net

  loki:
    image: grafana/loki:latest
    container_name: procurement_loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki:/etc/loki
      - loki_data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    networks:
      - procurement_net

  promtail:
    image: grafana/promtail:latest
    container_name: procurement_promtail
    restart: unless-stopped
    volumes:
      - ./observability/promtail:/etc/promtail
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      - loki
    networks:
      - procurement_net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: procurement_otel_collector
    restart: unless-stopped
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # OTel metrics
      - "8889:8889"   # Prometheus exporter
    volumes:
      - ./observability/otel:/etc/otel
    command: --config=/etc/otel/otel-collector-config.yml
    networks:
      - procurement_net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: procurement_node_exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - procurement_net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: procurement_cadvisor
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true
    networks:
      - procurement_net

# ────────────────────────────────────────────────────────────
# VOLUMES & NETWORK
# ────────────────────────────────────────────────────────────

volumes:
  postgres_data:
  qdrant_data:
  minio_data:
  ollama_data:
  prometheus_data:
  grafana_data:
  loki_data:

networks:
  procurement_net:
    driver: bridge
