---
# Main ingress for the Procurement Intelligence Platform
# Fuente única de routing para procurement.local.
# El Ingress del chart api-gateway está deshabilitado (ingress.enabled: false).
# El Ingress en frontend.yaml también está eliminado para evitar conflictos.
#
# IMPORTANTE — orden de paths en NGINX Ingress:
#   NGINX usa longest-prefix-match: /api gana sobre / para rutas /api/*.
#   El frontend (/) debe ir DESPUÉS de las rutas de API para que el catch-all
#   no interfiera con ellas; NGINX Ingress ordena por especificidad automáticamente.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: procurement-ingress
  namespace: ai-platform
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # Rate limiting global (rutas /api generales)
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type, Authorization"
spec:
  ingressClassName: nginx
  rules:
  - host: procurement.local
    http:
      paths:
      # API Gateway — rutas de la plataforma (stable service del Argo Rollout)
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: api-gateway-stable
            port:
              number: 8000
      # Health / readiness sin rate limiting
      - path: /health
        pathType: Exact
        backend:
          service:
            name: api-gateway-stable
            port:
              number: 8000
      # FastAPI docs — deben ir antes del catch-all del frontend
      - path: /docs
        pathType: Prefix
        backend:
          service:
            name: api-gateway-stable
            port:
              number: 8000
      - path: /redoc
        pathType: Prefix
        backend:
          service:
            name: api-gateway-stable
            port:
              number: 8000
      - path: /openapi.json
        pathType: Exact
        backend:
          service:
            name: api-gateway-stable
            port:
              number: 8000
      # Frontend — catch-all para la SPA (debe ser el último path)
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
---
# Monitoring ingress — Grafana
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  rules:
  - host: procurement.local
    http:
      paths:
      - path: /grafana
        pathType: Prefix
        backend:
          service:
            name: kube-prometheus-stack-grafana
            port:
              number: 80
---
# Strict rate-limited ingress for RAG endpoint
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rag-ratelimit-ingress
  namespace: ai-platform
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "120"
    # Tighter rate limit for LLM-heavy endpoint
    nginx.ingress.kubernetes.io/limit-rps: "10"
    nginx.ingress.kubernetes.io/limit-connections: "10"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "3"
    # Return 429 instead of 503 on rate limit
    nginx.ingress.kubernetes.io/limit-req-status-code: "429"
spec:
  rules:
  - host: procurement.local
    http:
      paths:
      - path: /api/v1/rag
        pathType: Prefix
        backend:
          service:
            name: api-gateway-stable
            port:
              number: 8000
      - path: /api/v1/agents
        pathType: Prefix
        backend:
          service:
            name: api-gateway-stable
            port:
              number: 8000
