# NGINX Ingress Controller Helm values
# Used by: helm upgrade --install ingress-nginx ingress-nginx/ingress-nginx -f k8s/ingress/ingress-nginx-values.yaml

controller:
  # NodePort for WSL2 / local K3s access
  service:
    type: NodePort
    nodePorts:
      http: 30080
      https: 30443

  # Resource limits for the ingress controller
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Prometheus metrics
  metrics:
    enabled: true
    service:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "10254"

  # Global proxy settings for LLM workloads
  config:
    proxy-read-timeout: "300"
    proxy-send-timeout: "300"
    proxy-connect-timeout: "10"
    proxy-body-size: "50m"
    # Enable real IP forwarding
    use-forwarded-headers: "true"
    compute-full-forwarded-for: "true"
    # Keep-alive for LLM streaming responses
    upstream-keepalive-connections: "32"
    upstream-keepalive-time: "300s"
    # Log format with request timing
    log-format-upstream: >
      $remote_addr - $remote_user [$time_local] "$request"
      $status $body_bytes_sent "$http_referer" "$http_user_agent"
      $request_length $request_time [$proxy_upstream_name]
      [$proxy_alternative_upstream_name] $upstream_addr
      $upstream_response_length $upstream_response_time $upstream_status $req_id

  # Replica count
  replicaCount: 1

  # Node selector (any node)
  nodeSelector: {}

  # Tolerations for GPU nodes (won't schedule on GPU-only nodes)
  tolerations: []

defaultBackend:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: 10m
      memory: 20Mi
    limits:
      cpu: 50m
      memory: 64Mi
