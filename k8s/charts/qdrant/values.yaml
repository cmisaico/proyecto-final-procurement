image:
  repository: qdrant/qdrant
  tag: "v1.12.1"
  pullPolicy: IfNotPresent

# Default collection created on first boot (optional helper job)
collection: procurement_chunks

service:
  type: ClusterIP
  port: 6333
  grpcPort: 6334

storage:
  size: 10Gi
  storageClassName: ""

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 2Gi

persistence:
  enabled: true
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  storageClassName: ""

# Qdrant config overrides (merged into /qdrant/config/production.yaml)
config:
  log_level: INFO
  service:
    host: "0.0.0.0"
    http_port: 6333
    grpc_port: 6334
    enable_cors: true
  storage:
    storage_path: /qdrant/storage
    snapshots_path: /qdrant/snapshots
  cluster:
    enabled: false
