apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "qdrant.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "qdrant.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "qdrant.fullname" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "qdrant.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "qdrant.selectorLabels" . | nindent 8 }}
      annotations:
        # Restart pods when the config ConfigMap changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      securityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsNonRoot: true

      containers:
        - name: qdrant
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
              protocol: TCP

          env:
            - name: QDRANT__SERVICE__HTTP_PORT
              value: {{ .Values.service.port | quote }}
            - name: QDRANT__SERVICE__GRPC_PORT
              value: {{ .Values.service.grpcPort | quote }}
            - name: QDRANT__LOG_LEVEL
              value: {{ .Values.config.log_level | quote }}
            - name: QDRANT__STORAGE__STORAGE_PATH
              value: "/qdrant/storage"
            - name: QDRANT__CLUSTER__ENABLED
              value: "false"

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
            successThreshold: 1

          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
            successThreshold: 1

          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
            - name: qdrant-snapshots
              mountPath: /qdrant/snapshots

      volumes:
        - name: qdrant-storage
          persistentVolumeClaim:
            claimName: {{ include "qdrant.pvcName" . }}
        # Snapshots use an emptyDir by default; replace with a PVC for durability
        - name: qdrant-snapshots
          emptyDir: {}
