image:
  repository: procurement/embeddings
  tag: "latest"
  pullPolicy: IfNotPresent

replicaCount: 1

# Model configuration
model:
  name: nomic-ai/nomic-embed-text-v1.5
  dimension: 768
  # Device: cpu | cuda | mps
  device: cpu
  # Maximum number of tokens per input text
  maxLength: 512
  # Number of texts to encode in a single forward pass
  batchSize: 32

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: 2000m
    memory: 4Gi

# Horizontal Pod Autoscaler
hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# Model weights are downloaded on first boot and cached in an emptyDir.
# Set modelCache.persistence.enabled=true to use a PVC instead.
modelCache:
  persistence:
    enabled: false
    size: 5Gi
    storageClassName: ""
    accessModes:
      - ReadWriteOnce

# Pod-level security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# Container-level security context
containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false   # sentence-transformers writes to ~/.cache
  capabilities:
    drop: ["ALL"]

# Additional environment variables injected into the container
extraEnv: []
# - name: HF_TOKEN
#   valueFrom:
#     secretKeyRef:
#       name: hf-token
#       key: token

nodeSelector: {}
tolerations: []
affinity: {}
