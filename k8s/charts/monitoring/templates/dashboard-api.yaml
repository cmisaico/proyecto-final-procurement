apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-platform-api
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    {{- include "monitoring.labels" . | nindent 4 }}
data:
  platform-api.json: |-
    {
      "id": null,
      "uid": "platform-api",
      "title": "Platform API",
      "tags": ["procurement", "api"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "10s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Total Requests",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [{
            "expr": "sum(procurement_http_requests_total)",
            "legendFormat": "Total"
          }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "area" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "blue", "value": null }] } } }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Active Requests",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [{
            "expr": "sum(procurement_http_requests_active)",
            "legendFormat": "Active"
          }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 5 }, { "color": "red", "value": 20 }] } } }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Error Rate",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [{
            "expr": "sum(rate(procurement_http_errors_total[5m])) / sum(rate(procurement_http_requests_total[5m])) * 100",
            "legendFormat": "Error %"
          }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none" },
          "fieldConfig": { "defaults": { "unit": "percent", "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1 }, { "color": "red", "value": 5 }] } } }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "P99 Latency",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [{
            "expr": "histogram_quantile(0.99, sum(rate(procurement_http_request_duration_seconds_bucket[5m])) by (le))",
            "legendFormat": "P99"
          }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none" },
          "fieldConfig": { "defaults": { "unit": "s", "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 1 }, { "color": "red", "value": 5 }] } } }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Request Rate by Endpoint",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [{
            "expr": "sum(rate(procurement_http_requests_total[1m])) by (endpoint)",
            "legendFormat": "{{"{{"}} endpoint {{"}}"}}"
          }],
          "fieldConfig": { "defaults": { "unit": "reqps", "custom": { "lineWidth": 2 } } },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "table", "placement": "bottom" } }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Request Latency Percentiles",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(procurement_http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "P50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(procurement_http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "P95"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(procurement_http_request_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "P99"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "s", "custom": { "lineWidth": 2 } } },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "table", "placement": "bottom" } }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Error Rate by Endpoint",
          "gridPos": { "x": 0, "y": 12, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [{
            "expr": "sum(rate(procurement_http_errors_total[1m])) by (endpoint, status_code)",
            "legendFormat": "{{"{{"}} endpoint {{"}}"}} ({{"{{"}} status_code {{"}}"}})"
          }],
          "fieldConfig": { "defaults": { "unit": "reqps", "custom": { "lineWidth": 2 }, "color": { "mode": "fixed", "fixedColor": "red" } } },
          "options": { "tooltip": { "mode": "multi" } }
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Active Requests Over Time",
          "gridPos": { "x": 12, "y": 12, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [{
            "expr": "sum(procurement_http_requests_active) by (endpoint)",
            "legendFormat": "{{"{{"}} endpoint {{"}}"}}"
          }],
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "lineWidth": 2, "fillOpacity": 20 } } },
          "options": { "tooltip": { "mode": "multi" } }
        }
      ]
    }
