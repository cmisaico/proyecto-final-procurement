apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-agents-workflows
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    {{- include "monitoring.labels" . | nindent 4 }}
data:
  agents-workflows.json: |-
    {
      "id": null,
      "uid": "agents-workflows",
      "title": "Agents & Workflows",
      "tags": ["procurement", "agents", "langgraph"],
      "timezone": "browser",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "10s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Total Workflow Runs",
          "gridPos": { "x": 0, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [{
            "expr": "sum(procurement_workflow_runs_total)",
            "legendFormat": "Runs"
          }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "blue", "value": null }] } } }
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Total Agent Runs",
          "gridPos": { "x": 6, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [{
            "expr": "sum(procurement_agent_runs_total)",
            "legendFormat": "Runs"
          }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "fieldConfig": { "defaults": { "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "purple", "value": null }] } } }
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Avg Compliance Score",
          "gridPos": { "x": 12, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [{
            "expr": "avg(procurement_agent_compliance_score)",
            "legendFormat": "Score"
          }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1, "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "red", "value": null }, { "color": "yellow", "value": 0.6 }, { "color": "green", "value": 0.8 }] } } }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Avg Guardrail Score",
          "gridPos": { "x": 18, "y": 0, "w": 6, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [{
            "expr": "avg(procurement_agent_guardrail_score)",
            "legendFormat": "Score"
          }],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background" },
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1, "color": { "mode": "thresholds" }, "thresholds": { "steps": [{ "color": "red", "value": null }, { "color": "yellow", "value": 0.6 }, { "color": "green", "value": 0.85 }] } } }
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Workflow Run Rate",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [{
            "expr": "sum(rate(procurement_workflow_runs_total[5m])) by (workflow_type)",
            "legendFormat": "{{"{{"}} workflow_type {{"}}"}}"
          }],
          "fieldConfig": { "defaults": { "unit": "reqps", "custom": { "lineWidth": 2 } } },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "table", "placement": "bottom" } }
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Workflow Duration Percentiles",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(procurement_workflow_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "P50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(procurement_workflow_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "P95"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "s", "custom": { "lineWidth": 2 } } },
          "options": { "tooltip": { "mode": "multi" } }
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Agent Run Rate by Agent Type",
          "gridPos": { "x": 0, "y": 12, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [{
            "expr": "sum(rate(procurement_agent_runs_total[5m])) by (agent_type)",
            "legendFormat": "{{"{{"}} agent_type {{"}}"}}"
          }],
          "fieldConfig": { "defaults": { "unit": "reqps", "custom": { "lineWidth": 2 } } },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "table", "placement": "bottom" } }
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Agent Duration by Type",
          "gridPos": { "x": 12, "y": 12, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [{
            "expr": "histogram_quantile(0.95, sum(rate(procurement_agent_duration_seconds_bucket[5m])) by (le, agent_type))",
            "legendFormat": "{{"{{"}} agent_type {{"}}"}} P95"
          }],
          "fieldConfig": { "defaults": { "unit": "s", "custom": { "lineWidth": 2 } } },
          "options": { "tooltip": { "mode": "multi" }, "legend": { "displayMode": "table", "placement": "bottom" } }
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Compliance & Guardrail Scores Over Time",
          "gridPos": { "x": 0, "y": 20, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "avg(procurement_agent_compliance_score)",
              "legendFormat": "Compliance"
            },
            {
              "expr": "avg(procurement_agent_guardrail_score)",
              "legendFormat": "Guardrail"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0, "max": 1, "custom": { "lineWidth": 2 } } },
          "options": { "tooltip": { "mode": "multi" } }
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Agent Errors",
          "gridPos": { "x": 12, "y": 20, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [{
            "expr": "sum(rate(procurement_agent_errors_total[5m])) by (agent_type)",
            "legendFormat": "{{"{{"}} agent_type {{"}}"}}"
          }],
          "fieldConfig": { "defaults": { "unit": "reqps", "custom": { "lineWidth": 2 }, "color": { "mode": "fixed", "fixedColor": "red" } } },
          "options": { "tooltip": { "mode": "multi" } }
        }
      ]
    }
