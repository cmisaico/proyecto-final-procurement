apiVersion: v1
kind: Secret
metadata:
  name: vllm-hf-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "vllm.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
    # IMPORTANT: Replace the value below with a real HuggingFace token.
    # Generate a token at https://huggingface.co/settings/tokens
    # Then base64-encode it: echo -n "hf_YOUR_TOKEN" | base64
type: Opaque
data:
  HF_TOKEN: {{ .Values.hfToken | b64enc | quote }}
