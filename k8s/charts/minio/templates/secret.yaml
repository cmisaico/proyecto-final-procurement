apiVersion: v1
kind: Secret
metadata:
  name: {{ include "minio.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "minio.labels" . | nindent 4 }}
type: Opaque
data:
  MINIO_ROOT_USER: {{ .Values.rootUser | b64enc | quote }}
  MINIO_ROOT_PASSWORD: {{ .Values.rootPassword | b64enc | quote }}
