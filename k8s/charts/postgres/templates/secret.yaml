apiVersion: v1
kind: Secret
metadata:
  name: {{ include "postgres.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "postgres.labels" . | nindent 4 }}
type: Opaque
data:
  POSTGRES_PASSWORD: {{ .Values.password | b64enc | quote }}
  POSTGRES_USER: {{ .Values.username | b64enc | quote }}
  POSTGRES_DB: {{ .Values.database | b64enc | quote }}
