apiVersion: v1
kind: Secret
metadata:
  name: {{ include "api-gateway.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "api-gateway.labels" . | nindent 4 }}
  annotations:
    # Helm will manage this secret's lifecycle with the release.
    # For production, consider using an external secrets operator instead of
    # storing plaintext values in values.yaml.
    helm.sh/resource-policy: keep
type: Opaque
data:
  # Values are base64-encoded by Helm using the b64enc function.
  # In production, override these via --set secrets.postgresPassword=... or a
  # sealed-secrets / external-secrets workflow — never commit plaintext to git.
  POSTGRES_PASSWORD: {{ .Values.secrets.postgresPassword | b64enc | quote }}
  MINIO_ACCESS_KEY: {{ .Values.secrets.minioAccessKey | b64enc | quote }}
  MINIO_SECRET_KEY: {{ .Values.secrets.minioSecretKey | b64enc | quote }}
