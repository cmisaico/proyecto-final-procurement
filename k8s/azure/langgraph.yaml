image:
  repository: acrprocurementazdev.azurecr.io/procurement-api
  tag: "latest"
  pullPolicy: IfNotPresent

nodeSelector:
  kubernetes.io/os: linux
  nodepool: user

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      podAffinityTerm:
        labelSelector:
          matchLabels:
            app: langgraph
        topologyKey: kubernetes.io/hostname

topologySpreadConstraints:
- maxSkew: 1
  topologyKey: kubernetes.io/hostname
  whenUnsatisfiable: DoNotSchedule
  labelSelector:
    matchLabels:
      app: langgraph

config:
  STORAGE_BACKEND: "azure"
  POSTGRES_HOST: "psql-procurement-az-dev.postgres.database.azure.com"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "procurement_db"
  POSTGRES_USER: "procureadmin"
  VLLM_BASE_URL: "http://vllm.ai-platform.svc.cluster.local:8000/v1"
  VLLM_MODEL: "qwen2.5-7b"
  EMBEDDINGS_BASE_URL: "http://embeddings.ai-platform.svc.cluster.local:8080/v1"
  QDRANT_HOST: "qdrant.ai-platform.svc.cluster.local"
  QDRANT_PORT: "6333"
  AZURE_STORAGE_ACCOUNT: "stprocurementazadev"
  AZURE_STORAGE_CONTAINER: "licitaciones"
  CONTEXT_TOP_K: "10"
  MAX_CONTEXT_TOKENS: "4000"
  GUARDRAIL_THRESHOLD: "0.35"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.ai-platform.svc.cluster.local:4317"
  OTEL_SERVICE_NAME: "langgraph-worker"
  WORKER_POLL_INTERVAL: "15"
