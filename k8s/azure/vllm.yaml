image:
  repository: acrprocurementazdev.azurecr.io/vllm-openai
  tag: "v0.8.5.post1"
  pullPolicy: IfNotPresent

nodeSelector:
  kubernetes.io/os: linux
  nodepool: gpu
  hardware: nvidia-t4

tolerations:
- key: "nvidia.com/gpu"
  operator: "Equal"
  value: "present"
  effect: "NoSchedule"

resources:
  requests:
    memory: "8Gi"
    cpu: "2"
    nvidia.com/gpu: "1"
  limits:
    memory: "14Gi"
    cpu: "4"
    nvidia.com/gpu: "1"
